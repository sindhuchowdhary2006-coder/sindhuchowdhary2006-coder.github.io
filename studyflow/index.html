<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StudyFlow — Your Ultimate Study Motivation Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="brand"><i class="fas fa-book-open-reader"></i><span>Study<em>Flow</em></span></div>
    <div class="nav-links" id="nav-links">
      <button class="nl active" data-tab="home"   onclick="goTab('home')">  <i class="fas fa-house"></i>       Home</button>
      <button class="nl"        data-tab="timer"  onclick="goTab('timer')"> <i class="fas fa-clock"></i>       Focus Timer</button>
      <button class="nl"        data-tab="tasks"  onclick="goTab('tasks')"> <i class="fas fa-list-check"></i>  Tasks</button>
      <button class="nl"        data-tab="stats"  onclick="goTab('stats')"> <i class="fas fa-chart-line"></i>  Stats</button>
      <button class="nl"        data-tab="music"  onclick="goTab('music')"> <i class="fas fa-music"></i>       Music</button>
      <button class="nl"        data-tab="quotes" onclick="goTab('quotes')"><i class="fas fa-quote-left"></i>  Quotes</button>
    </div>
    <button class="hbg" id="hbg" onclick="toggleNav()"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<div id="root"></div>
<div id="toast-el" class="toast-el"></div>

<script src="app.js"></script>
</body>
</html>
