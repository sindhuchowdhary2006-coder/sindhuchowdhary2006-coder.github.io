<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Disaster Prep — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="dash.css"/>
</head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand"><i class="fas fa-shield-halved"></i><span>Disaster Prep</span></div>
      <button class="sb-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>
    <nav id="sb-nav" class="sb-nav"></nav>
    <div class="sb-foot">
      <button class="sb-signout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <span class="tb-title" id="tb-title">Home</span>
      <div class="tb-right">
        <div class="tb-avatar" id="tb-avatar"></div>
      </div>
    </header>
    <main class="main-content" id="main-content"></main>
  </div>
</div>

<div id="toast" class="toast dn"></div>
<div id="modal-overlay" class="modal-overlay dn" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()" id="modal-box"></div>
</div>

<script src="dash.js"></script>
</body>
</html>
